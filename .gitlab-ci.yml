stages:
  - build
  - test

variables:
  GIT_SUBMODULE_STRATEGY: recursive

# --- Build (Linux) ---
build-linux:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq build-essential cmake git
        libsdl2-dev libgl-dev
  script:
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
    - cmake --build build --config Release -j$(nproc)
    - ls -la build/3dsnes build/test_emu 2>/dev/null || ls -la build/Release/ 2>/dev/null
  artifacts:
    paths:
      - build/
    expire_in: 1 week

# --- Build (Windows cross-compile, optional) ---
# Uncomment if you have a Windows runner
# build-windows:
#   stage: build
#   tags:
#     - windows
#   script:
#     - cmake -S . -B build
#     - cmake --build build --config Release
#   artifacts:
#     paths:
#       - build/Release/3dsnes.exe
#     expire_in: 1 week

# --- Test (smoke test - verify binary runs) ---
test-smoke:
  stage: test
  image: ubuntu:22.04
  needs: [build-linux]
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq libsdl2-2.0-0 libgl1 xvfb
  script:
    # Run with virtual framebuffer (no display needed)
    - export SDL_VIDEODRIVER=dummy
    - export SDL_AUDIODRIVER=dummy
    # Verify binary exists and prints usage
    - chmod +x build/3dsnes || true
    - build/3dsnes 2>&1 | head -5 || true
    - echo "Smoke test passed - binary built successfully"
