stages:
  - build

variables:
  GIT_SUBMODULE_STRATEGY: none

build-windows:
  stage: build
  tags:
    - windows
  script:
    # Clone imgui submodule manually (runner's git doesn't support submodules)
    - if (!(Test-Path ext\imgui)) { git clone --depth 1 https://github.com/ocornut/imgui.git ext/imgui }
    # Install SDL2 via vcpkg
    - if (!(Test-Path C:\vcpkg)) { git clone https://github.com/microsoft/vcpkg.git C:\vcpkg }
    - if (!(Test-Path C:\vcpkg\vcpkg.exe)) { & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics }
    - C:\vcpkg\vcpkg install sdl2:x64-windows
    # Build
    - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release -A x64
    - cmake --build build --config Release
    - Get-ChildItem build\Release\3dsnes.exe
  artifacts:
    paths:
      - build/Release/3dsnes.exe
      - build/Release/*.dll
    expire_in: 1 week
