stages:
  - build

variables:
  GIT_SUBMODULE_STRATEGY: none

build-windows:
  stage: build
  tags:
    - windows
  script:
    # Install cmake
    - choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y --no-progress
    # Refresh PATH
    - Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"; Update-SessionEnvironment
    # Install VC++ Build Tools via vs_buildtools directly
    - $vsBT = "C:\Windows\Temp\vs_buildtools.exe"
    - if (!(Test-Path $vsBT)) { Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile $vsBT }
    - Start-Process -FilePath $vsBT -ArgumentList "--add","Microsoft.VisualStudio.Workload.VCTools","--includeRecommended","--quiet","--wait","--norestart" -Wait -NoNewWindow
    # Find vcvarsall.bat
    - Write-Host "Searching for vcvarsall.bat..."
    - $vcvars = Get-ChildItem -Path "C:\" -Recurse -Filter "vcvarsall.bat" -ErrorAction SilentlyContinue | Select-Object -First 1
    - if (!$vcvars) { Write-Host "NOT FOUND - listing VS dirs"; Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio" -Recurse -Depth 4 -Directory -ErrorAction SilentlyContinue | Select-Object FullName; exit 1 }
    - Write-Host "Found $($vcvars.FullName)"
    # Activate MSVC environment
    - $vcvarsPath = $vcvars.FullName
    - '& cmd /c "call ""$vcvarsPath"" x64 >nul 2>&1 && set" | ForEach-Object { if ($_ -match "^(.+?)=(.*)$") { [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2]) } }'
    - Get-Command cl -ErrorAction Stop | Select-Object Source
    # Clone imgui submodule
    - if (!(Test-Path ext\imgui)) { git clone --depth 1 https://github.com/ocornut/imgui.git ext/imgui }
    # Install SDL2 via vcpkg
    - if (!(Test-Path C:\vcpkg\vcpkg.exe)) { git clone https://github.com/microsoft/vcpkg.git C:\vcpkg; & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics }
    - C:\vcpkg\vcpkg install sdl2:x64-windows
    # Build
    - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -A x64
    - cmake --build build --config Release
    - Get-ChildItem build\Release\3dsnes.exe
  artifacts:
    paths:
      - build/Release/3dsnes.exe
      - build/Release/*.dll
    expire_in: 1 week
  timeout: 30m
