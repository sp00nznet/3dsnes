stages:
  - build

variables:
  GIT_SUBMODULE_STRATEGY: none

build-windows:
  stage: build
  tags:
    - windows
  script:
    # Install build tools (cached from previous runs)
    - choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y --no-progress
    - choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended" -y --no-progress
    # Refresh PATH
    - Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"; Update-SessionEnvironment
    # Find and activate MSVC
    - $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
    - $vsPath = & $vsWhere -latest -property installationPath
    - Write-Host "VS Install Path = $vsPath"
    - $vcvarsall = "$vsPath\VC\Auxiliary\Build\vcvarsall.bat"
    - '& cmd /c "call ""$vcvarsall"" x64 && set" | ForEach-Object { if ($_ -match "^(.+?)=(.*)$") { [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2]) } }'
    - Get-Command cl | Select-Object Source
    # Clone imgui submodule
    - if (!(Test-Path ext\imgui)) { git clone --depth 1 https://github.com/ocornut/imgui.git ext/imgui }
    # Install SDL2 via vcpkg
    - if (!(Test-Path C:\vcpkg\vcpkg.exe)) { git clone https://github.com/microsoft/vcpkg.git C:\vcpkg; & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics }
    - C:\vcpkg\vcpkg install sdl2:x64-windows
    # Build
    - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -A x64
    - cmake --build build --config Release
    - Get-ChildItem build\Release\3dsnes.exe
  artifacts:
    paths:
      - build/Release/3dsnes.exe
      - build/Release/*.dll
    expire_in: 1 week
