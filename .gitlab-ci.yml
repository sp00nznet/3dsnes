stages:
  - build

variables:
  GIT_SUBMODULE_STRATEGY: none

build-windows:
  stage: build
  tags:
    - windows
  script:
    # Probe what's available
    - Write-Host "=== Probing ==="
    - Get-Command choco -ErrorAction SilentlyContinue
    - Get-Command winget -ErrorAction SilentlyContinue
    - Get-Command scoop -ErrorAction SilentlyContinue
    - Get-ChildItem "C:\Program Files" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
    - Get-ChildItem "C:\Program Files (x86)" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
    - Get-ChildItem "C:\" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
    - $env:PATH -split ';' | ForEach-Object { Write-Host $_ }
    - Write-Host "=== Done ==="
